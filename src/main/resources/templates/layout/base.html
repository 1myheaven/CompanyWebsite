<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">YourCompany</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" th:fragment="navbar">
    <div class="container">
        
        <a class="navbar-brand fw-bold" th:href="@{/}">NirmalVeda</a>

        <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#navbarNav" 
                aria-controls="navbarNav" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/services}">Services</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/case-studies}">Case Studies</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact</a></li>

                <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                    <a class="btn btn-warning text-dark fw-semibold w-100" th:href="@{/consultation}">
                        Get Consultation
                    </a>
                </li>

                <li class="nav-item ms-lg-3 mt-2 mt-lg-0 text-center">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">
                            🔒
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer class="bg-dark text-white text-center py-5 mt-5" th:fragment="footer">
    <div class="container">
        <img th:src="@{/images/companylogo.png}" alt="Company Logo"
             style="height:90px; width:90px; border-radius:50%; object-fit:cover;">
        <p class="mb-1 fw-semibold mt-3">© 2026 All Rights Reserved</p>
        <small class="text-secondary">Helping Businesses Grow with Data & Technology</small>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
